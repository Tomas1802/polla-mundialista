name: Keep backend awake

# Render's free tier sleeps the backend after ~15 min of inactivity, which stops
# the football-data sync ticker. This pings /healthz every 10 minutes during
# match hours (UTC) so the service stays awake and keeps capturing results.
# Outside this window there are no matches, so the cold-start + daily sync suffice.
on:
  schedule:
    - cron: '*/10 14-23,0-5 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          BASE="${{ vars.VITE_API_BASE }}"
          if [ -z "$BASE" ]; then
            echo "VITE_API_BASE repo variable not set; nothing to ping."
            exit 0
          fi
          BASE="${BASE%/}"
          echo "Pinging $BASE/healthz"
          # Render cold starts can take ~50s; allow time and retries.
          curl --fail --silent --show-error \
               --retry 4 --retry-delay 15 --retry-all-errors \
               --max-time 90 \
               "$BASE/healthz" && echo "OK"
